<!DOCTYPE html>
<html>
<head>
  <title>Coupon Checker</title>
</head>
<body style="font-family: Arial; text-align:center; margin-top:50px;">
  
  <h1>Enter Coupon</h1>

  <input id="code" placeholder="SAVE10" style="font-size:20px; padding:10px;">
  <br><br>
  <button onclick="check()" style="font-size:20px; padding:10px;">Apply</button>

  <h2 id="result"></h2>

  <script>
    async function check() {
      const code = document.getElementById('code').value;

      const res = await fetch(`/validate?code=${code}`);
      const data = await res.json();

      if (data.valid) {
        document.getElementById('result').innerText =
          `Apply ${data.value}% discount`;
      } else {
        document.getElementById('result').innerText =
          "Invalid code";
      }
    }
  </script>

</body>
</html>
